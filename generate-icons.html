<!DOCTYPE html>
<html><head><title>Generate FightOS Icons</title></head>
<body style="background:#222;color:#fff;font-family:monospace;padding:40px;">
<h2>FightOS Icon Generator</h2>
<p>Right-click each image → "Save image as..." to save as PNG</p>
<div style="display:flex;gap:20px;margin-top:20px;">
  <div>
    <canvas id="c192" width="192" height="192"></canvas>
    <p>192x192 → save as img/icons/icon-192.png</p>
  </div>
  <div>
    <canvas id="c512" width="512" height="512"></canvas>
    <p>512x512 → save as img/icons/icon-512.png</p>
  </div>
</div>
<script>
function drawIcon(id, size) {
  var c = document.getElementById(id);
  var ctx = c.getContext('2d');
  var r = size * 0.15;
  // Rounded rect background
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(size-r, 0); ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size-r); ctx.quadraticCurveTo(size, size, size-r, size);
  ctx.lineTo(r, size); ctx.quadraticCurveTo(0, size, 0, size-r);
  ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#080808';
  ctx.fill();
  // "F" letter
  ctx.fillStyle = '#E8000D';
  ctx.font = 'bold ' + (size * 0.55) + 'px "Arial Black", Impact, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('F', size * 0.48, size * 0.45);
  // "OS" subtitle
  ctx.fillStyle = '#333';
  ctx.font = 'bold ' + (size * 0.12) + 'px Arial, sans-serif';
  ctx.fillText('OS', size * 0.52, size * 0.78);
}
drawIcon('c192', 192);
drawIcon('c512', 512);
// Auto-download
['c192','c512'].forEach(function(id) {
  var c = document.getElementById(id);
  var link = document.createElement('a');
  link.download = id === 'c192' ? 'icon-192.png' : 'icon-512.png';
  link.href = c.toDataURL('image/png');
  link.click();
});
</script>
</body></html>
