<!DOCTYPE html>
<html><head><title>Generate FightOS Icons</title></head>
<body style="background:#222;color:#fff;font-family:monospace;padding:40px;">
<h2>FightOS Icon Generator</h2>
<p>Click "Generate All" — icons download automatically.</p>
<button onclick="generateAll()" style="padding:12px 24px;background:#E8000D;color:#fff;border:none;font-size:16px;cursor:pointer;border-radius:6px;">GENERATE ALL ICONS</button>
<div id="preview" style="display:flex;flex-wrap:wrap;gap:16px;margin-top:24px;"></div>
<div id="log" style="margin-top:20px;color:#0f0;"></div>
<script>
var SIZES = [72, 96, 128, 144, 152, 180, 192, 384, 512];

function drawIcon(ctx, size, maskable) {
  var pad = maskable ? size * 0.1 : 0;
  var s = size - pad * 2;
  var ox = pad, oy = pad;
  // Background
  if (maskable) {
    ctx.fillStyle = '#080808';
    ctx.fillRect(0, 0, size, size);
  } else {
    var r = s * 0.15;
    ctx.beginPath();
    ctx.moveTo(ox+r, oy); ctx.lineTo(ox+s-r, oy); ctx.quadraticCurveTo(ox+s, oy, ox+s, oy+r);
    ctx.lineTo(ox+s, oy+s-r); ctx.quadraticCurveTo(ox+s, oy+s, ox+s-r, oy+s);
    ctx.lineTo(ox+r, oy+s); ctx.quadraticCurveTo(ox, oy+s, ox, oy+s-r);
    ctx.lineTo(ox, oy+r); ctx.quadraticCurveTo(ox, oy, ox+r, oy);
    ctx.closePath();
    ctx.fillStyle = '#080808';
    ctx.fill();
  }
  // "F"
  ctx.fillStyle = '#E8000D';
  ctx.font = 'bold ' + (s * 0.55) + 'px "Arial Black", Impact, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('F', ox + s * 0.48, oy + s * 0.45);
  // "OS"
  ctx.fillStyle = '#555';
  ctx.font = 'bold ' + (s * 0.12) + 'px Arial, sans-serif';
  ctx.fillText('OS', ox + s * 0.52, oy + s * 0.78);
}

function generateAll() {
  var preview = document.getElementById('preview');
  var log = document.getElementById('log');
  preview.innerHTML = '';
  log.innerHTML = '';
  var delay = 0;

  SIZES.forEach(function(size) {
    setTimeout(function() {
      var c = document.createElement('canvas');
      c.width = size; c.height = size;
      drawIcon(c.getContext('2d'), size, false);
      // Download
      var link = document.createElement('a');
      link.download = 'icon-' + size + 'x' + size + '.png';
      link.href = c.toDataURL('image/png');
      link.click();
      // Preview
      var div = document.createElement('div');
      div.style.textAlign = 'center';
      div.appendChild(c);
      div.innerHTML += '<p>' + size + 'x' + size + '</p>';
      preview.appendChild(div);
      log.innerHTML += 'Downloaded icon-' + size + 'x' + size + '.png<br>';
    }, delay);
    delay += 300;
  });

  // Maskable 512
  setTimeout(function() {
    var c = document.createElement('canvas');
    c.width = 512; c.height = 512;
    drawIcon(c.getContext('2d'), 512, true);
    var link = document.createElement('a');
    link.download = 'icon-512x512-maskable.png';
    link.href = c.toDataURL('image/png');
    link.click();
    var div = document.createElement('div');
    div.style.textAlign = 'center';
    div.appendChild(c);
    div.innerHTML += '<p>512x512 maskable</p>';
    preview.appendChild(div);
    log.innerHTML += 'Downloaded icon-512x512-maskable.png<br>';
    log.innerHTML += '<br><strong>DONE! Move all PNGs to img/icons/</strong>';
  }, delay);
}
</script>
</body></html>
